bastion:
- name: bastion myip or internet #bastion accepting connection from myip or internet
  port: 22
  src: internet
  dest: bastion
mongodb:
- name: mongodb bastion #mongodb accepting connection from bastion
  port: 22
  src: bastion
  dest: mongodb
- name: mongodb catalogue #mongodb accepting connection from catalogue
  port: 27017
  src: catalogue
  dest: mongodb
- name: mongodb bastion #mongodb accepting connection from user
  port: 27017
  src: user
  dest: mongodb